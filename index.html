<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriLab — Health Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F3EE;--card:#FFFFFF;--ink:#1C1916;--ink-2:#504A43;--ink-3:#9B9489;
  --gold:#B8924A;--gold-lt:#F5ECD9;--sage:#527A58;--sage-lt:#E6EFE7;
  --rust:#B84A3A;--rust-lt:#FAEAE8;--sky:#3D6B8C;--sky-lt:#E4EDF5;
  --border:#E2DDD6;--r:13px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:16px;line-height:1.6}
.wrap{max-width:700px;margin:0 auto;padding:2rem 1.25rem 6rem}

.hdr{text-align:center;padding:2.5rem 0 2rem}
.brand{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:500;letter-spacing:-.01em}
.brand em{color:var(--gold);font-style:normal}
.sub{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-top:.3rem}

.prog{margin-bottom:2.5rem}
.prog-row{display:flex;justify-content:space-between;font-size:.8125rem;color:var(--ink-3);margin-bottom:.45rem}
.prog-track{height:2px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--sage));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2.25rem 2.5rem;box-shadow:0 2px 20px rgba(28,25,22,.07);animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:560px){.card{padding:1.5rem 1.25rem}}

.q-eyebrow{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
.q-eyebrow::before{content:'';width:18px;height:1px;background:var(--gold)}
.q-title{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:500;line-height:1.3;margin-bottom:.5rem}
.q-body{font-size:.9375rem;color:var(--ink-2);margin-bottom:1.5rem;line-height:1.55}

.opts{display:flex;flex-direction:column;gap:.5rem}
.opts.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
@media(max-width:520px){.opts.grid2{grid-template-columns:1fr}}

.opt{display:flex;align-items:flex-start;gap:.875rem;padding:.8rem 1rem;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .16s ease;background:var(--bg);user-select:none}
.opt:hover{border-color:var(--gold);background:var(--gold-lt)}
.opt.sel{border-color:var(--sage);background:var(--sage-lt)}
.opt.sel .chk{background:var(--sage);border-color:var(--sage)}
.opt.sel .chk svg{display:block}
.opt.warn-opt:hover{border-color:var(--rust);background:var(--rust-lt)}
.opt.warn-opt.sel{border-color:var(--rust);background:var(--rust-lt)}
.opt.warn-opt.sel .chk{background:var(--rust);border-color:var(--rust)}
.opt.radio-style .chk{border-radius:50%}

.chk{width:19px;height:19px;min-width:19px;border:1.5px solid var(--border);border-radius:4px;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chk svg{display:none;width:11px;height:11px}
.ol{font-size:.9375rem;font-weight:400;line-height:1.4;flex:1}
.od{font-size:.8125rem;color:var(--ink-3);margin-top:.15rem;line-height:1.4}
.owarn{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:500;color:var(--rust);background:#fde;border:1px solid #fbc;padding:.15rem .5rem;border-radius:99px;margin-top:.3rem}

.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.75rem;gap:.75rem}
.btn{padding:.72rem 1.6rem;border-radius:8px;border:none;font-family:'Jost',sans-serif;font-size:.9375rem;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--ink-2)}
.btn-primary:disabled{background:var(--border);color:var(--ink-3);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink-3);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--ink-2);color:var(--ink)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:#9c7838}

.banner{border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1.1rem;font-size:.875rem;display:flex;gap:.75rem;align-items:flex-start;line-height:1.5}
.banner-warn{background:var(--rust-lt);border:1.5px solid var(--rust);color:#7a1e00}
.banner-info{background:var(--sky-lt);border:1.5px solid var(--sky);color:#1e3d5a}
.banner-gold{background:var(--gold-lt);border:1.5px solid var(--gold);color:#5c3d00}
.banner-icon{flex-shrink:0;font-size:1.1rem;margin-top:.05rem}

/* ── Results ── */
.results-top{text-align:center;padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.results-title{font-family:'Cormorant Garamond',serif;font-size:2rem;margin-bottom:.4rem}
.results-sub{color:var(--ink-3);font-size:.9375rem}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem;margin-bottom:1.5rem}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.875rem;text-align:center}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500}
.stat-l{font-size:.75rem;color:var(--ink-3);margin-top:.1rem}

.formula-block{border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:.875rem}
.formula-hdr{padding:.9rem 1.125rem;display:flex;align-items:center;gap:.75rem}
.formula-icon{font-size:1.35rem;width:2.2rem;text-align:center}
.formula-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:500;color:#fff}
.formula-sub{font-size:.775rem;color:rgba(255,255,255,.7);margin-top:.1rem}
.formula-body{padding:1rem 1.125rem}
.timing-label{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:.5rem;margin-top:.875rem}
.timing-label:first-child{margin-top:0}

/* ingredient rows in results — with description */
.ing-row{display:flex;align-items:flex-start;gap:.625rem;padding:.6rem 0;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:8px}
.ing-info{flex:1;min-width:0}
.ing-name{font-size:.9375rem;font-weight:500;line-height:1.3}
.ing-desc{font-size:.8125rem;color:var(--ink-3);margin-top:.15rem;line-height:1.4}
.ing-right{display:flex;flex-direction:column;align-items:flex-end;gap:.25rem;flex-shrink:0}
.ing-dose{font-size:.8125rem;color:var(--ink-3);font-family:'DM Mono',monospace;white-space:nowrap}
.timing-tag{font-size:.7rem;padding:.1rem .45rem;border-radius:99px;font-weight:500;white-space:nowrap}
.t-am{background:#FEF9E7;color:#7D6608;border:1px solid #E8D5A0}
.t-pm{background:#EBF5FB;color:#1A5276;border:1px solid #AED6F1}
.t-meal{background:#EAFAF1;color:#1D8348;border:1px solid #A9DFBF}

.disclaimer{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1.125rem;font-size:.8125rem;color:var(--ink-3);line-height:1.6;margin-top:1.5rem}
.disclaimer strong{color:var(--ink-2)}
.restart{text-align:center;margin-top:1.25rem}
.restart button{background:none;border:none;color:var(--ink-3);font-size:.875rem;cursor:pointer;text-decoration:underline;font-family:'Jost',sans-serif}

/* ── Pricing page ── */
.pricing-header{padding-bottom:1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.pricing-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;margin-bottom:.3rem}
.pricing-sub{color:var(--ink-3);font-size:.9rem;line-height:1.5}

.pricing-section{margin-bottom:1.5rem}
.pricing-section-label{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:.625rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}

.price-ing-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.7rem .875rem;
  border:1.5px solid var(--border);
  border-radius:9px;
  margin-bottom:.4rem;
  background:var(--bg);
  transition:all .15s;
}
.price-ing-row.included{background:var(--card);border-color:var(--sage)}
.price-ing-row.excluded{background:var(--bg);border-color:var(--border);opacity:.55}

.toggle-btn{
  width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;
  position:relative;transition:background .2s;flex-shrink:0;
  background:var(--border);
}
.toggle-btn.on{background:var(--sage)}
.toggle-btn::after{
  content:'';position:absolute;width:16px;height:16px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-btn.on::after{transform:translateX(18px)}

.price-ing-info{flex:1;min-width:0}
.price-ing-name{font-size:.9rem;font-weight:500;line-height:1.3}
.price-ing-desc{font-size:.775rem;color:var(--ink-3);margin-top:.1rem}
.price-ing-unit{font-size:.8125rem;color:var(--ink-3);font-family:'DM Mono',monospace;text-align:right;flex-shrink:0;min-width:60px}

.price-added-label{font-size:.7rem;background:var(--gold-lt);color:var(--gold);border:1px solid #ddc08a;padding:.1rem .45rem;border-radius:99px;font-weight:500;flex-shrink:0}

.price-summary{background:var(--ink);border-radius:12px;padding:1.25rem 1.5rem;color:#fff;margin-top:1.5rem}
.price-summary-row{display:flex;justify-content:space-between;align-items:center;font-size:.9375rem;padding:.3rem 0}
.price-summary-row.total{border-top:1px solid rgba(255,255,255,.15);margin-top:.5rem;padding-top:.75rem;font-weight:500;font-size:1.0625rem}
.price-summary-row.total .amount{font-family:'Cormorant Garamond',serif;font-size:1.5rem}
.price-summary-note{font-size:.775rem;color:rgba(255,255,255,.55);margin-top:.75rem;line-height:1.5}

.price-cta{margin-top:1.25rem;display:flex;flex-direction:column;gap:.625rem}
.btn-full{width:100%;text-align:center;padding:.875rem}

/* category colors */
.c-sleep{background:#3C3489}.c-stress{background:#185FA5}.c-cog{background:#854F0B}

  else{S.meds=S.meds.filter(m=>m!=='none');const i=S.meds.indexOf(id);if(i>=0)S.meds.splice(i,1);else S.meds.push(id);}
  render();
}

// ─── ALGORITHM ────────────────────────────────────────────────────
function buildFormula(){
  const medTags=new Set();
  S.meds.forEach(id=>{const m=MEDS.find(x=>x.id===id);if(m)m.tags.forEach(t=>medTags.add(t));});
  const needsReview=S.meds.some(id=>{const m=MEDS.find(x=>x.id===id);return m&&m.risk==='high'&&id!=='none';});

  const formulaMap={};
  const globalSeen=new Set();

  S.concerns.forEach(catKey=>{
    const aspects=FOLLOWUPS[catKey]||[];
    const am=[],pm=[],meal=[];

    aspects.forEach(aspect=>{
      const score=aspect.questions.reduce((acc,q)=>{
        const ai=S.answers[q.id];
        return ai===undefined?acc:acc+q.options[ai].score;
      },0);
      if(score<aspect.threshold)return;

      let added=0;
      aspect.ingredients.forEach(ing=>{
        if(added>=4||globalSeen.has(ing.name))return;
        if(ing.cautions.some(c=>medTags.has(c)))return;
        globalSeen.add(ing.name);
        if(ing.timing==='AM')am.push(ing);
        else if(ing.timing==='PM')pm.push(ing);
        else meal.push(ing);
        added++;
      });
    });

    formulaMap[catKey]={am,pm,meal};
  });

  // Resolve ingredient-ingredient conflicts
  const allSel=[];
  Object.values(formulaMap).forEach(f=>allSel.push(...f.am,...f.pm,...f.meal));
  CONFLICTS.forEach(([a,b])=>{
    const iA=allSel.findIndex(i=>i.name===a);
    const iB=allSel.findIndex(i=>i.name===b);
    if(iA>=0&&iB>=0){
      const toRemove=allSel[iB];allSel.splice(iB,1);
      Object.values(formulaMap).forEach(f=>{
        ['am','pm','meal'].forEach(t=>{
          const idx=f[t].findIndex(x=>x.name===toRemove.name);
          if(idx>=0)f[t].splice(idx,1);
        });
      });
    }
  });

  // Cap at 4 per category
  Object.values(formulaMap).forEach(f=>{
    let tot=f.am.length+f.pm.length+f.meal.length;
    while(tot>4){
      if(f.meal.length>0)f.meal.pop();
      else if(f.pm.length>0)f.pm.pop();
      else f.am.pop();
      tot--;
    }
  });

  return{formulaMap,needsReview};
}

function goResults(){
  S.formulaResult=buildFormula();
  // Build all possible ingredients across all concerns (including those blocked by meds or caps)
  // for the pricing page to show as add-ons
  const allPossible=new Map();
  S.concerns.forEach(catKey=>{
    (FOLLOWUPS[catKey]||[]).forEach(aspect=>{
      aspect.ingredients.forEach(ing=>{
        if(!allPossible.has(ing.name))allPossible.set(ing.name,{...ing,catKey,aspectLabel:aspect.aspectLabel});
      });
    });
  });
  S.allPossibleIngredients=Array.from(allPossible.values());

  // Set default toggles: recommended = on, others = off
  const recNames=new Set();
  Object.values(S.formulaResult.formulaMap).forEach(f=>{
    [...f.am,...f.pm,...f.meal].forEach(i=>recNames.add(i.name));
  });
  S.pricingToggles={};
  S.allPossibleIngredients.forEach(ing=>{
    S.pricingToggles[ing.name]=recNames.has(ing.name);
  });

  S.phase='results';render();
}

function renderResults(c){

    if(t==='PM')return`<span class="timing-tag t-pm">Evening</span>`;

      <div class="ing-name">${ing.name}</div>
      <div class="ing-desc">${ING_DESC[ing.name]||''}</div>
    </div>
    <div class="ing-right">
      <div class="ing-dose">${ing.dose}</div>
      ${tTag(ing.timing)}
    </div>
  </div>`;

  let fHtml='';
  const noTriggers=S.concerns.every(k=>{
    const f=formulaMap[k];return f.am.length+f.pm.length+f.meal.length===0;
  });

  S.concerns.forEach(catKey=>{
    const f=formulaMap[catKey];
    const cat=CATS[catKey];

    if(hasItems){
      fHtml+=`<div class="formula-block">
        <div class="formula-hdr ${cat.color}">
          <div class="formula-icon">${cat.icon}</div>
          <div>
            <div class="formula-name">${cat.name}</div>
            <div class="formula-sub">${f.am.length+f.pm.length+f.meal.length} ingredient${f.am.length+f.pm.length+f.meal.length!==1?'s':''} recommended</div>
          </div>
        </div>
        <div class="formula-body">`;
      if(f.am.length+f.meal.length>0){
        fHtml+=`<div class="timing-label">☀️ Morning</div>`;
        [...f.am,...f.meal].forEach(ing=>{fHtml+=ingRowHtml(ing);});
      }
      if(f.pm.length>0){
        fHtml+=`<div class="timing-label">🌙 Evening</div>`;
        f.pm.forEach(ing=>{fHtml+=ingRowHtml(ing);});
      }
      fHtml+=`</div></div>`;
    } else {
      // Category selected but no ingredients triggered — show clearly with option to add on next page
      fHtml+=`<div class="formula-block">
        <div class="formula-hdr ${cat.color}" style="opacity:.75">
          <div class="formula-icon">${cat.icon}</div>
          <div>
            <div class="formula-name">${cat.name}</div>
            <div class="formula-sub">No supplement support needed based on your answers</div>
          </div>
        </div>
        <div class="formula-body" style="display:flex;align-items:flex-start;gap:.75rem;padding:1rem 1.125rem">
          <div style="font-size:1.1rem;flex-shrink:0;margin-top:.05rem">✅</div>
          <div>
            <div style="font-size:.9375rem;font-weight:500;color:var(--ink);margin-bottom:.25rem">Your ${cat.name.toLowerCase()} symptoms appear mild or well-managed.</div>
            <div style="font-size:.8125rem;color:var(--ink-3);line-height:1.55">Based on your answers, supplemental support is not clinically indicated at this time. If you would still like to add ${cat.name.toLowerCase()} ingredients to your formula, you can do so on the next page.</div>
          </div>
        </div>
      </div>`;
    }
  });

  const reviewBanner=needsReview
    ?`<div class="banner banner-warn"><span class="banner-icon">🔒</span><div><strong>Pharmacist review required</strong> — based on your medications, a licensed pharmacist will review your formula before preparation. This takes 2–4 hours during business hours.</div></div>`
    :`<div class="banner banner-info"><span class="banner-icon">✓</span><div>No high-risk interactions flagged. Your formula will be reviewed by a licensed pharmacist as standard practice.</div></div>`;

  c.innerHTML=`<div class="card">
    <div class="results-top">

      <div class="results-sub">Based on your specific symptoms and health profile</div>
    </div>
    ${reviewBanner}
    <div class="stat-row">
      <div class="stat"><div class="stat-n" style="color:var(--gold)">${totAM+totMeal}</div><div class="stat-l">Morning ingredients</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--sky)">${totPM}</div><div class="stat-l">Evening ingredients</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--sage)">${S.concerns.length}</div><div class="stat-l">Goals assessed</div></div>

    </div>

}

// ─── PRICING PAGE ─────────────────────────────────────────────────
function renderPricing(c){
  setP('Customize & Order',100);

  // Gather all ingredients across all categories for display
  // Build two groups: recommended (on) and available add-ons (off)
  const recNames=new Set();
  Object.values(S.formulaResult.formulaMap).forEach(f=>{
    [...f.am,...f.pm,...f.meal].forEach(i=>recNames.add(i.name));
  });

  // Group by category
  const byCat={};
  S.allPossibleIngredients.forEach(ing=>{
    if(!byCat[ing.catKey])byCat[ing.catKey]=[];
    byCat[ing.catKey].push(ing);
  });

  let sectionsHtml='';
  S.concerns.forEach(catKey=>{
    const ings=byCat[catKey];
    if(!ings||ings.length===0)return;
    const cat=CATS[catKey];

    // Separate recommended vs available
    const recommended=ings.filter(i=>recNames.has(i.name));
    const addOns=ings.filter(i=>!recNames.has(i.name));

    let rowsHtml='';
    recommended.forEach(ing=>{
      const on=S.pricingToggles[ing.name]!==false;
      const price=(ING_PRICE[ing.name]||6.00).toFixed(2);
      rowsHtml+=`<div class="price-ing-row${on?' included':' excluded'}" id="prow-${CSS.escape(ing.name)}">
        <button class="toggle-btn${on?' on':''}" onclick="toggleIng('${ing.name.replace(/'/g,"\\'")}')"></button>
        <div class="price-ing-info">
          <div class="price-ing-name">${ing.name}</div>
          <div class="price-ing-desc">${ING_DESC[ing.name]||''}</div>
        </div>
        <div class="price-ing-unit">$${price}</div>
      </div>`;
    });

    if(addOns.length>0){
      rowsHtml+=`<div style="font-size:.75rem;color:var(--ink-3);margin:.75rem 0 .4rem;display:flex;align-items:center;gap:.5rem">
        <span>Also available for ${cat.icon} ${cat.name}</span>
        <span style="flex:1;height:1px;background:var(--border);display:block"></span>
      </div>`;
      addOns.forEach(ing=>{
        const on=S.pricingToggles[ing.name]===true;
        const price=(ING_PRICE[ing.name]||6.00).toFixed(2);
        rowsHtml+=`<div class="price-ing-row${on?' included':' excluded'}" id="prow-${CSS.escape(ing.name)}">
          <button class="toggle-btn${on?' on':''}" onclick="toggleIng('${ing.name.replace(/'/g,"\\'")}')"></button>
          <div class="price-ing-info">
            <div class="price-ing-name">${ing.name} ${!recNames.has(ing.name)?'<span class="price-added-label">Add-on</span>':''}</div>
            <div class="price-ing-desc">${ING_DESC[ing.name]||''}</div>
          </div>
          <div class="price-ing-unit">$${price}</div>
        </div>`;
      });
    }

    sectionsHtml+=`<div class="pricing-section">
      <div class="pricing-section-label">${cat.icon} ${cat.name}</div>
      ${rowsHtml}
    </div>`;
  });

  c.innerHTML=`<div class="card">
    <div class="pricing-header">
      <div class="pricing-title">Review & Customize Your Formula</div>
      <div class="pricing-sub">Your recommended ingredients are already included. Toggle any on or off — your pharmacist will review the final selection before preparation.</div>
    </div>

    <div class="banner banner-info" style="margin-bottom:1.25rem">
      <span class="banner-icon">ℹ</span>
      <div>Prices shown are per 30-day supply. Toggle ingredients on or off to customize your formula. All prices in CAD.</div>
    </div>

    ${sectionsHtml}

    <div class="price-summary" id="price-summary-block">
      <!-- filled by calcPrice() -->
    </div>

    <div class="price-cta">
      <button class="btn btn-gold btn-full" onclick="alert('Order flow coming soon — this would proceed to checkout.')">Proceed to Checkout →</button>
      <button class="btn btn-ghost btn-full" onclick="S.phase='results';render()">← Back to Formula</button>
    </div>

    <div class="disclaimer" style="margin-top:1rem">
      <strong>Pharmacist review:</strong> Regardless of any changes you make here, a licensed pharmacist at CompoundIt Pharmacy will review your final formula before preparation. They may contact you if they have any clinical questions about your selection.
    </div>
  </div>`;

  calcPrice();
}

function toggleIng(name){
  S.pricingToggles[name]=!S.pricingToggles[name];
  // Re-render just the toggle row and summary
  renderPricing(document.getElementById('qc'));
}

function calcPrice(){
  let subtotal=0;
  let selectedCount=0;
  Object.entries(S.pricingToggles).forEach(([name,on])=>{
    if(on){subtotal+=ING_PRICE[name]||6;selectedCount++;}
  });

  const beforeTax=subtotal+SHIPPING;
  const tax=beforeTax*TAX_RATE;
  const total=beforeTax+tax;

  const block=document.getElementById('price-summary-block');
  if(!block)return;
  block.innerHTML=`
    <div class="price-summary-row"><span>Supplements (${selectedCount} selected, 30-day supply)</span><span class="amount">$${subtotal.toFixed(2)}</span></div>
    <div class="price-summary-row"><span>Shipping (Canada)</span><span class="amount">$${SHIPPING.toFixed(2)}</span></div>
    <div class="price-summary-row"><span>HST (13%)</span><span class="amount">$${tax.toFixed(2)}</span></div>
    <div class="price-summary-row total"><span>Total / month</span><span class="amount">$${total.toFixed(2)}</span></div>
